name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter --version

      - run: flutter config --enable-web

      - run: flutter pub get

      - run: flutter build web --release --base-href "/"
        env:
          GITHUB_PAGES: true
          GITHUB_PAGES_DOMAIN: skoleom-ai-studio.skoleom.ai
          SKOLEOM_AGENTS_ENDPOINT: ${{ secrets.SKOLEOM_AGENTS_ENDPOINT }}
          SKOLEOM_API_BASE_URL: ${{ secrets.SKOLEOM_API_BASE_URL }}
          SKOLEOM_AUTH_LOGIN_ENDPOINT: ${{ secrets.SKOLEOM_AUTH_LOGIN_ENDPOINT }}
          SKOLEOM_BILLING_ENDPOINT: ${{ secrets.SKOLEOM_BILLING_ENDPOINT }}
          SKOLEOM_CHAT_ENDPOINT: ${{ secrets.SKOLEOM_CHAT_ENDPOINT }}
          SKOLEOM_PROJECTS_ENDPOINT: ${{ secrets.SKOLEOM_PROJECTS_ENDPOINT }}
          SKOLEOM_USAGE_ENDPOINT: ${{ secrets.SKOLEOM_USAGE_ENDPOINT }}

      - name: Configure static routing
        run: cp build/web/index.html build/web/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - uses: actions/deploy-pages@v4
